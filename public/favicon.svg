<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Anton&amp;display=swap');
      .logo-text {
        font-family: 'Anton', 'Impact', sans-serif-condensed, sans-serif;
        font-size: 38px;
        text-transform: uppercase;
        letter-spacing: 0;
        font-weight: 400;
      }
    </style>
