<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#0096FF" stroke-width="3"/>
  
  <!-- M letter -->
  <path d="M 50 140 L 50 60 L 75 90 L 100 60 L 125 90 L 150 60 L 150 140" 
        fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- C letter integrated with circuit pattern -->
  <path d="M 180 100 A 50 50 0 0 1 130 150" 
        fill="none" stroke="#0096FF" stroke-width="6" stroke-linecap="round"/>
  <path d="M 180 100 A 50 50 0 0 0 130 50" 
        fill="none" stroke="#0096FF" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Circuit nodes -->
  <circle cx="75" cy="90" r="4" fill="#0096FF"/>
  <circle cx="125" cy="90" r="4" fill="#0096FF"/>
  <circle cx="50" cy="60" r="4" fill="#FFFFFF"/>
  <circle cx="100" cy="60" r="4" fill="#FFFFFF"/>
  <circle cx="150" cy="60" r="4" fill="#FFFFFF"/>
</svg>
