    <style>
        /* ── Reset & Base ── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0B0B0B;
            --fg: #FFFFFF;
            --muted: rgba(255, 255, 255, 0.45);
            --border: rgba(255, 255, 255, 0.10);
            --glass: rgba(255, 255, 255, 0.03);
            --blue: #4DA6FF;
            --glow: rgba(37, 99, 235, 0.18);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: 'Inter', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        /* Subtle grid overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(128, 128, 128, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(128, 128, 128, 0.04) 1px, transparent 1px);
            background-size: 32px 32px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Layout Shell ── */
        .page {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 0 1.25rem;
        }

        .inner {
            width: 100%;
            max-width: 900px;
        }

        /* ── Header bar ── */
        .site-header {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 0 1.5rem;
        }

        .site-logo {
            height: 36px;
            width: auto;
        }

        .lang-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 0.9rem;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--glass);
            color: var(--fg);
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s;
            font-family: inherit;
        }

        .lang-btn:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .lang-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--blue);
            display: inline-block;
        }

        /* ── Hero Section ── */
        .hero {
            padding: 3.5rem 0 2rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .micro-label {
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .hero-h1 {
            font-size: clamp(2rem, 6vw, 3.6rem);
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -0.02em;
            color: var(--fg);
        }

        /* Gradient on part of the headline */
        .grad {
            color: #4DA6FF;
        }

        .hero-subtext {
            font-size: clamp(0.95rem, 2.5vw, 1.15rem);
            color: rgba(255, 255, 255, 0.65);
            max-width: 540px;
            line-height: 1.6;
            font-weight: 400;
        }

        .hero-actions {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            margin-top: 0.5rem;
        }

        .cta-btn {
            display: inline-block;
            padding: 0.8rem 2.2rem;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--blue), var(--violet));
            color: #fff;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 24px var(--glow);
            transition: filter 0.2s, transform 0.15s;
            text-decoration: none;
        }

        .cta-btn:hover {
            filter: brightness(1.12);
            transform: translateY(-1px);
        }

        .cta-btn:active {
            transform: translateY(0);
        }

        .lang-link {
            font-size: 0.72rem;
            color: var(--muted);
            text-decoration: underline;
            text-underline-offset: 3px;
            cursor: pointer;
            background: none;
            border: none;
            font-family: inherit;
            transition: color 0.2s;
        }

        .lang-link:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        /* ── Terminal Module ── */
        .terminal-wrap {
            width: 100%;
            margin: 2.5rem 0 2rem;
        }

        .terminal-box {
            width: 100%;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            overflow: hidden;
        }

        /* Subtle glow halo */
        .terminal-box::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 21px;
            box-shadow: 0 0 40px rgba(37, 99, 235, 0.08);
            pointer-events: none;
        }

        .terminal-wrap {
            position: relative;
        }

        .term-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.65rem 1rem;
            border-bottom: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.02);
        }

        .term-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .term-dot.red {
            background: rgba(255, 95, 87, 0.55);
        }

        .term-dot.yellow {
            background: rgba(255, 189, 46, 0.55);
        }

        .term-dot.green {
            background: rgba(40, 200, 64, 0.55);
        }

        .term-title {
            margin-left: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 0.06em;
        }

        .term-body {
            padding: 1.1rem 1.25rem 1.25rem;
            height: 220px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .term-lines {
            display: flex;
            flex-direction: column;
            gap: 0.28rem;
            flex: 1;
        }

        .term-line {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.75);
            white-space: pre;
            opacity: 1;
            transition: opacity 0.4s ease;
        }

        .term-line.fading {
            opacity: 0;
        }

        .term-line .prompt {
            color: var(--blue);
        }

        .term-cursor {
            display: inline-block;
            width: 7px;
            height: 0.85em;
            background: rgba(255, 255, 255, 0.7);
            vertical-align: text-bottom;
            animation: blink 700ms step-end infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        /* Reduced motion: static display, no typewriter */
        @media (prefers-reduced-motion: reduce) {
            .term-cursor {
                animation: none;
                opacity: 0.6;
            }
        }

        /* ── Divider ── */
        .section-divider {
            width: 100%;
            height: 1px;
            background: var(--border);
            margin: 1rem 0 2.5rem;
        }

        /* ── Booking Section ── */
        .booking-section {
            width: 100%;
            padding-bottom: 4rem;
        }

        .booking-label {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .booking-label h2 {
            font-size: clamp(1.4rem, 4vw, 2.2rem);
            font-weight: 700;
            letter-spacing: -0.01em;
            margin-bottom: 0.4rem;
        }

        .booking-label p {
            font-size: 0.95rem;
            color: var(--muted);
        }

        .booking-shell {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.02);
            overflow: hidden;
            height: 580px;
        }

        #my-cal-inline-30min-uc {
            width: 100%;
            height: 100%;
            overflow: scroll;
        }

        /* ── Footer ── */
        .site-footer {
            width: 100%;
            max-width: 900px;
            border-top: 1px solid var(--border);
            padding: 1.5rem 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .footer-brand {
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .footer-copy {
            font-size: 0.65rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            text-align: right;
        }

        /* ── Mobile adjustments ── */
        @media (max-width: 600px) {
            .hero {
                padding: 2.5rem 0 1.5rem;
            }

            .term-body {
                height: 200px;
            }

            .term-line {
                font-size: 0.65rem;
            }

            .booking-shell {
                height: 520px;
            }

            .site-footer {
                flex-direction: column;
                align-items: flex-start;
            }

            .footer-copy {
                text-align: left;
            }
        }
    </style>

</head>

<body>
    <div class="page">

        <!-- ── Header ── -->
        <header class="site-header">
            <img src="../assets/MC-Designs-Logo.svg" alt="MC Designs" class="site-logo" />
            <button class="lang-btn" id="lang-toggle" aria-label="Toggle language">
                <span class="lang-dot"></span>
                <span id="lang-text">ES</span>
            </button>
        </header>

        <div class="inner">

            <!-- ── Hero ── -->
            <section class="hero" aria-label="Under construction hero">
                <p class="micro-label">MC DESIGNS • WEB DESIGN STUDIO</p>

                <h1 class="hero-h1" id="hero-h1">
                    Tu negocio,<br>diseñado para <span style="color:#4DA6FF">crecer.</span>
                </h1>

                <p class="hero-subtext" id="hero-subtext">
                    Diseño web para negocios listos para crecer. Próximamente.
                </p>

                <div class="hero-actions">
                    <button class="lang-link" id="lang-link">View in English</button>
                </div>
            </section>



        </div><!-- /inner -->

        <!-- ── Footer ── -->
        <footer class="site-footer">
            <div class="footer-brand">MC DESIGNS</div>
            <div class="footer-copy">© 2025 MC Designs. Built in Puerto Rico.</div>
        </footer>

    </div><!-- /page -->

    <!-- ── ES/EN Toggle Script ── -->
    <script>
        (function () {
            const copy = {
                es: {
                    h1: 'Tu negocio,<br>diseñado para <span style="color:#4DA6FF">crecer.</span>',
                    subtext: 'Diseño web para negocios listos para crecer. Próximamente.',
                    langLink: 'View in English',
                    langLabel: 'ES'
                },
                en: {
                    h1: 'Your business,<br>built to be <span style="color:#4DA6FF">found.</span>',
                    subtext: 'Web design for businesses ready to grow. Launching soon.',
                    langLink: 'Ver en Español',
                    langLabel: 'EN'
                },
            };

            let lang = 'es';

            function applyLang(l) {
                const c = copy[l];
                document.getElementById('hero-h1').innerHTML = c.h1;
                document.getElementById('hero-subtext').textContent = c.subtext;
                document.getElementById('lang-link').textContent = c.langLink;
                document.getElementById('lang-text').textContent = c.langLabel;
                document.documentElement.lang = l;
            }

            function toggle() {
                lang = lang === 'es' ? 'en' : 'es';
                applyLang(lang);
            }

            document.getElementById('lang-toggle').addEventListener('click', toggle);
            document.getElementById('lang-link').addEventListener('click', toggle);
        })();
    </script>



</body>
