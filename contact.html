<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Contact | MC DESIGNS</title>

    <!-- Tailwind CSS v3 CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        black: '#000000',
                        white: '#FFFFFF',
                        accent: '#0033FF',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        heading: ['Anton', 'Impact', 'sans-serif-condensed', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style data-purpose="typography">
        @import url('https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@300;400;700&display=swap');

        body {
            background-color: #000000;
            color: #FFFFFF;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .heading-condensed {
            font-family: 'Anton', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .border-subtle {
            border-color: rgba(255, 255, 255, 0.1);
        }

        .bg-accent-gradient {
            background: linear-gradient(135deg, #e0f2fe 0%, #3b82f6 100%);
        }

        .border-accent-gradient {
            border-image: linear-gradient(135deg, #e0f2fe 0%, #3b82f6 100%) 1;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>

    <style data-purpose="layout-grid">
        .grid-standard {
            display: grid;
            gap: 2rem;
        }

        @media (min-width: 768px) {
            .grid-standard {
                gap: 4rem;
            }
        }

        /* Architectural lines */
        .section-border {
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 4rem;
            margin-top: 4rem;
        }
    </style>

    <style data-purpose="background-grid">
        .bg-grid-pattern {
            background-image: linear-gradient(rgba(128, 128, 128, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(128, 128, 128, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            background-color: #000000;
        }

        /* Remove any blue vignette or glow effects */
        body::before,
        body::after {
            display: none !important;
        }
    </style>
</head>

<body class="bg-black text-white px-6 md:px-12 lg:px-24 bg-grid-pattern">

    <!-- BEGIN: Navigation -->
    <nav class="flex justify-between items-center py-4 border-b border-subtle glass-panel px-6 rounded-2xl mt-4 sticky top-4 z-50 transition-all duration-300"
        data-purpose="main-navigation">
        <a href="index.html"
            class="heading-condensed text-2xl md:text-4xl tracking-tighter hover:opacity-80 transition-opacity z-50 relative">MC
            DESIGNS</a>

        <!-- Desktop Menu -->
        <div class="hidden md:flex space-x-8 text-sm font-bold tracking-widest uppercase items-center">
            <a class="hover:opacity-60 transition-opacity" href="work.html">Work</a>
            <a class="hover:opacity-60 transition-opacity" href="services.html">Services</a>
            <a class="text-accent underline underline-offset-4" href="contact.html">Contact</a>
        </div>
        <a class="hidden md:flex bg-accent-gradient font-black px-8 py-3 rounded-lg hover:opacity-90 transition-opacity items-center justify-center text-sm"
            href="tools.html" data-gradient-button style="color: #FFFFFF;">TOOL HUB</a>

        <!-- Mobile Menu Button -->
        <button id="mobile-menu-btn" class="md:hidden z-50 relative p-2 text-white focus:outline-none">
            <svg id="menu-icon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
            <svg id="close-icon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 hidden" fill="none"
                viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
    </nav>

    <!-- Mobile Menu Overlay -->
    <div id="mobile-menu"
        class="fixed inset-0 bg-black/95 backdrop-blur-xl z-40 hidden flex flex-col justify-center items-center space-y-8">
        <a class="text-2xl font-bold tracking-widest uppercase hover:text-accent transition-colors"
            href="index.html">Home</a>
        <a class="text-2xl font-bold tracking-widest uppercase hover:text-accent transition-colors"
            href="work.html">Work</a>
        <a class="text-2xl font-bold tracking-widest uppercase hover:text-accent transition-colors"
            href="services.html">Services</a>
        <a class="text-2xl font-bold tracking-widest uppercase text-accent underline underline-offset-4"
            href="contact.html">Contact</a>
        <a class="text-2xl font-bold tracking-widest uppercase hover:text-accent transition-colors"
            href="tools.html">Tool Hub</a>
    </div>
    <!-- END: Navigation -->

    <!-- BEGIN: Contact -->
    <section class="min-h-screen pt-12 md:pt-20 pb-20" data-purpose="contact-form" id="contact">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-16">
            <div>
                <h2 class="heading-condensed text-6xl md:text-8xl mb-6">CONNECT</h2>
                <p class="opacity-60 text-lg">Ready to build something structured? Fill out the brief and I'll get back
                    to you
                    within 24 hours.</p>
            </div>
            <form action="#" class="space-y-6 glass-panel p-8 rounded-xl" data-purpose="project-inquiry-form"
                method="POST">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="flex flex-col">
                        <label class="text-[10px] uppercase font-bold tracking-widest mb-2" for="name">Name</label>
                        <input
                            class="bg-transparent border-b border-subtle border-t-0 border-x-0 focus:ring-0 focus:border-white p-2 text-sm"
                            id="name" name="name" placeholder="John Doe" required="" type="text" />
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[10px] uppercase font-bold tracking-widest mb-2" for="email">Email</label>
                        <input
                            class="bg-transparent border-b border-subtle border-t-0 border-x-0 focus:ring-0 focus:border-white p-2 text-sm"
                            id="email" name="email" placeholder="john@example.com" required="" type="email" />
                    </div>
                </div>
                <div class="flex flex-col">
                    <label class="text-[10px] uppercase font-bold tracking-widest mb-2" for="type">Project Type</label>
                    <select
                        class="bg-transparent border-b border-subtle border-t-0 border-x-0 focus:ring-0 focus:border-white p-2 text-sm appearance-none cursor-pointer"
                        id="type" name="type">
                        <option class="bg-black text-white">Web Design &amp; Development</option>
                        <option class="bg-black text-white">AI / Automation Systems</option>
                        <option class="bg-black text-white">Visual Identity / Branding</option>
                        <option class="bg-black text-white">Full Stack Product</option>
                    </select>
                </div>
                <div class="flex flex-col">
                    <label class="text-[10px] uppercase font-bold tracking-widest mb-2" for="message">Message</label>
                    <textarea
                        class="bg-transparent border-b border-subtle border-t-0 border-x-0 focus:ring-0 focus:border-white p-2 text-sm resize-none"
                        id="message" name="message" placeholder="Describe the scope and goals..." required=""
                        rows="4"></textarea>
                </div>
                <button
                    class="w-full md:w-auto px-12 py-5 bg-accent-gradient font-black tracking-widest text-sm hover:opacity-90 transition-opacity uppercase rounded-xl"
                    type="submit" data-gradient-button style="color: #FFFFFF;">
                    DISCUSS YOUR PROJECT →
                </button>
            </form>
        </div>
    </section>
    <!-- END: Contact -->

    <!-- BEGIN: Footer -->
    <footer class="border-t border-subtle py-12 flex flex-col md:flex-row justify-between items-center gap-6 mt-20"
        data-purpose="site-footer">
        <div class="heading-condensed text-xl">MC DESIGNS</div>
        <div class="text-[10px] tracking-widest uppercase opacity-40 text-center md:text-right">
            © 2024 MC DESIGNS. Serving clients in Puerto Rico and remotely. All systems nominal.
        </div>
    </footer>
    <!-- END: Footer -->

    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- Gradient Animation Script -->
    <script type="module" src="gradient-animation.js"></script>

    <!-- Mobile Menu Script -->
    <script type="module" src="mobile-menu.js"></script>
</body>

</html>
