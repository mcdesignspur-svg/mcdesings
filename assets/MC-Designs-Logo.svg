<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 60" width="320" height="60" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Anton&amp;display=swap');
      .logo-text {
        font-family: 'Anton', 'Impact', sans-serif-condensed, sans-serif;
        font-size: 48px;
        text-transform: uppercase;
        letter-spacing: 0;
        font-weight: 400; /* Anton only has 400 */
      }
    </style>
    <linearGradient id="mc-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background rect for testing (transparent) -->
  <rect width="100%" height="100%" fill="none"/>
  
  <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" class="logo-text">
    <tspan fill="url(#mc-gradient)">MC</tspan><tspan fill="#FFFFFF"> DESIGNS</tspan>
  </text>
</svg>
