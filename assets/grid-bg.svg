<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <!-- Vertical line -->
      <line x1="0" y1="0" x2="0" y2="40" stroke="#0056c6" stroke-width="1" opacity="0.08"/>
      <!-- Horizontal line -->
      <line x1="0" y1="0" x2="40" y2="0" stroke="#0056c6" stroke-width="1" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)"/>
</svg>
